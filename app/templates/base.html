<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" viewport-fit=cover>
    <title>{% block title %}Flask App{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script>
        // Ensure standalone mode persists on navigation
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
            document.querySelectorAll('a').forEach(link => {
                const url = new URL(link.href, window.location.origin);
                if (!url.searchParams.has('standalone')) {
                    url.searchParams.set('standalone', 'true');
                    link.href = url.toString();
                }
            });

            // Force `standalone=true` on form submissions (if needed)
            document.querySelectorAll('form').forEach(form => {
                const formAction = new URL(form.action, window.location.origin);
                if (!formAction.searchParams.has('standalone')) {
                    formAction.searchParams.set('standalone', 'true');
                    form.action = formAction.toString();
                }
            });
        }

    </script>
</head>
<body>
    <nav>
        <a href="/#/home">Home</a>
        {% if current_user.is_authenticated %}
            <a href="/#/profile">Profile</a>
            <a href="/#/logout">Logout</a>
        {% else %}
            <a href="/#/login">Login</a>
            <a href="/#/signup">Sign Up</a>
        {% endif %}
    </nav>    
    
    <div>
        {% block content %}{% endblock %}
    </div>
</body>
<script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/service-worker.js')
        .then(() => console.log('Service Worker Registered'))
        .catch(err => console.error('Service Worker Failed', err));
    }
  </script>
  
<link rel="manifest" href="/static/manifest.json">


</html>
