{% extends "base.html" %}

{% block extra_head %}
    <!-- Link both global styles and the specific problems page styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/create_contract.css') }}?v=1.0">
{% endblock %}

{% block content %}
<div class="top-bar">
    <h1>Create a New Contract</h1>
</div>

<div class="main-content">
    <form method="POST" action="{{ url_for('main.create_contract') }}">
        <label for="contract_name">Contract Name:</label>
        <input type="text" id="contract_name" name="contract_name" required placeholder="Enter contract name">

        <label for="members">Select Members:</label>
        <select id="members" name="members" multiple required>
            {% for user in all_users %}
            <option value="{{ user.id }}">{{ user.username }}</option>
            {% endfor %}
        </select>

        <button type="submit">Create Contract</button>
    </form>
</div>

<nav class="bottom-nav">
    <a href="/" class="nav-item">
        <i class="fa-solid fa-file-contract"></i>
        <span>Contracts</span>
    </a>
    <a href="/progress" class="nav-item">
        <i class="fa-solid fa-trophy"></i>
        <span>Progress</span>
    </a>
    <a href="/profile" class="nav-item">
        <i class="fa-solid fa-gear"></i>
        <span>Profile</span>
    </a>
</nav>
{% endblock %}
